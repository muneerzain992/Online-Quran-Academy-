services:
  db:
    image: postgres:16-alpine
    container_name: dfh-academy-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: academy
      POSTGRES_PASSWORD: academy
      POSTGRES_DB: academy
    volumes:
      - academy_pg:/var/lib/postgresql/data

volumes:
  academy_pg:
